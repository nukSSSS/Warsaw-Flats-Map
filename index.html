var MAX_SCORE   = 100;
var _items=[],_clusters=[];
function _fmtPrice(k){
    return (k*1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' PLN';
}
function _countMatch(key){
    var detail=APT_DETAIL[key];
    if(!detail) return 1;
    if(!_marketFilter&&!_userTypeFilter&&!_csFilter) return detail.length;
    var n=0;
    detail.forEach(function(d){
        if(_marketFilter&&d.mt!==_marketFilter) return;
        if(_userTypeFilter&&d.ut!==_userTypeFilter) return;
        if(_csFilter&&d.cs!==_csFilter) return;
        n++;
    });
    return n;
}
function _updateIconCount(mk,key){
    var n=_countMatch(key);
    if(!mk._icon) return;
    var sp=mk._icon.querySelector('.bld-icon-count');
    if(!sp) return;
    sp.textContent=n>1?n:'';
    sp.style.fontSize=(n>9?'9':'11')+'px';
}

    return l&&typeof l.clearLayers==='function'&&l.options&&l.options.maxClusterRadius!==undefined&&l.options.isFilterable===true;
}
function _init(){
    var theMap=window[MAP_NAME];
    if(!theMap){setTimeout(_init,300);return;}
    theMap.eachLayer(function(fg){
        if(!fg.eachLayer) return;
        fg.eachLayer(function(cl){
            if(!_isCluster(cl)) return;
            _clusters.push(cl);
            cl.eachLayer(function(mk){
                var ll=mk.getLatLng();
                var key=ll.lat.toFixed(5)+','+ll.lng.toFixed(5);
                _items.push({mk:mk,cl:cl,d:LOC_INDEX[key]||null});
            });
        });
    });
    var _totalApts=0;
    _items.forEach(function(item){
        var _ll=item.mk.getLatLng();
        var _k=_ll.lat.toFixed(5)+','+_ll.lng.toFixed(5);

    var _qd=_qp.get('district'),_qs=_qp.get('score'),_qpr=_qp.get('price');
    if(_qd){var _fd=document.getElementById('fd');if(_fd)_fd.value=_qd;}
    if(_qs){var _fs=document.getElementById('fs');if(_fs)_fs.value=_qs;}
    if(_qpr){var _fp=document.getElementById('fp');if(_fp)_fp.value=_qpr;}

                var txt=lbl.textContent||lbl.innerText;
                if(txt.indexOf('\u041d\u0435\u043f\u043e\u043b\u043d')>=0||txt.indexOf('\u041d\u0435\u0430\u043a\u0442')>=0){
                    var cb=lbl.querySelector('input[type=checkbox]');
                    if(cb&&cb.checked)cb.click();
                }
            });
        }
    }
    theMap.on('popupopen',function(){_filterOpenPopup();});
}
setTimeout(_init,900);
function _filterOpenPopup(){
    var theMap=window[MAP_NAME];
    if(!theMap||!theMap._popup||!theMap._popup.isOpen()) return;
    var el=theMap._popup.getElement();
    if(!el) return;
    var rows=el.querySelectorAll('.listing-row');
    if(!rows.length) return;
    var visible=0;
    rows.forEach(function(r){
        var show=true;
        if(_marketFilter&&r.getAttribute('data-mt')!==_marketFilter) show=false;
        if(_userTypeFilter&&r.getAttribute('data-ut')!==_userTypeFilter) show=false;
        if(_csFilter&&r.getAttribute('data-cs')!==_csFilter) show=false;
        r.style.display=show?'':'none';
        if(show) visible++;
    });
    var cnt=el.querySelector('.bld-count');
    if(cnt) cnt.textContent=visible;
}

    _marketFilter=v;

    ['fm-all','fm-pri','fm-sec'].forEach(function(id){
        var b=document.getElementById(id);
        if(b){b.style.background=id===btns[v]?'#546E7A':'#f5f5f5';b.style.color=id===btns[v]?'#fff':'#333';}
    });
    window.applyFilters();
    _filterOpenPopup();
};

    });
    window.applyFilters();
    _filterOpenPopup();
};
window.applyFilters=function(){
    var maxP=+document.getElementById('fp').value;
    var minA=+document.getElementById('fa').value;
    var minS=+document.getElementById('fs').value;
    var distQ=(document.getElementById('fd').value||'').toLowerCase().trim();
    document.getElementById('fp-val').textContent=maxP>=PRICE_MAX_K?'любая':_fmtPrice(maxP);
    document.getElementById('fa-val').textContent=minA<=50?'любая':minA+' м²';
    document.getElementById('fs-val').textContent=minS<=0?'любой':minS+' / '+MAX_SCORE;
    _clusters.forEach(function(cl){cl.clearLayers();});
    var shown=0;
    _items.forEach(function(item){
        var d=item.d,ok=true;
        if(d){
            if(maxP<PRICE_MAX_K&&d.p!==null&&d.p>maxP*1000) ok=false;
            if(minA>50&&d.a!==null&&d.a<minA) ok=false;
            if(minS>0&&d.s<minS) ok=false;
            if(distQ&&(!d.d||d.d.toLowerCase().indexOf(distQ)<0)) ok=false;
            if(_marketFilter&&d.mt.indexOf(_marketFilter)<0) ok=false;
            if(_userTypeFilter&&d.ut.indexOf(_userTypeFilter)<0) ok=false;
            if(_csFilter&&d.cs.indexOf(_csFilter)<0) ok=false;
        }
        var _ll=item.mk.getLatLng();
        var _k=_ll.lat.toFixed(5)+','+_ll.lng.toFixed(5);
        if(ok){item.cl.addLayer(item.mk);
            shown+=_countMatch(_k);

};
window.resetFilters=function(){

};
