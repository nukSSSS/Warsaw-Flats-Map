var MAX_SCORE   = 3760;
var _items=[],_clusters=[];
function _fmtPrice(k){
    return (k*1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' PLN';
}
function _isCluster(l){
    return l&&typeof l.clearLayers==='function'&&l.options&&l.options.maxClusterRadius!==undefined&&l.options.isFilterable===true;
}
function _init(){
    var theMap=window[MAP_NAME];
    if(!theMap){setTimeout(_init,300);return;}
    theMap.eachLayer(function(fg){
        if(!fg.eachLayer) return;
        fg.eachLayer(function(cl){
            if(!_isCluster(cl)) return;
            _clusters.push(cl);
            cl.eachLayer(function(mk){
                var ll=mk.getLatLng();
                var key=ll.lat.toFixed(5)+','+ll.lng.toFixed(5);
                _items.push({mk:mk,cl:cl,d:LOC_INDEX[key]||null});
            });
        });
    });
    var el=document.getElementById('f-count');
    if(el) el.textContent='Маркеров: '+_items.length;
    var _qp=new URLSearchParams(window.location.search);
    var _qd=_qp.get('district'),_qs=_qp.get('score'),_qpr=_qp.get('price');
    if(_qd){var _fd=document.getElementById('fd');if(_fd)_fd.value=_qd;}
    if(_qs){var _fs=document.getElementById('fs');if(_fs)_fs.value=_qs;}
    if(_qpr){var _fp=document.getElementById('fp');if(_fp)_fp.value=_qpr;}
    if(_qd||_qs||_qpr){window.applyFilters();}
}
setTimeout(_init,900);
window.applyFilters=function(){
    var maxP=+document.getElementById('fp').value;
    var minA=+document.getElementById('fa').value;
    var minS=+document.getElementById('fs').value;
    var distQ=(document.getElementById('fd').value||'').toLowerCase().trim();
    document.getElementById('fp-val').textContent=maxP>=PRICE_MAX_K?'любая':_fmtPrice(maxP);
    document.getElementById('fa-val').textContent=minA<=50?'любая':minA+' м²';
    document.getElementById('fs-val').textContent=minS<=0?'любой':minS+' / '+MAX_SCORE;
    _clusters.forEach(function(cl){cl.clearLayers();});
    var shown=0;
    _items.forEach(function(item){
        var d=item.d,ok=true;
        if(d){
            if(maxP<PRICE_MAX_K&&d.p!==null&&d.p>maxP*1000) ok=false;
            if(minA>50&&d.a!==null&&d.a<minA) ok=false;
            if(minS>0&&d.s<minS) ok=false;
            if(distQ&&(!d.d||d.d.toLowerCase().indexOf(distQ)<0)) ok=false;
        }
        if(ok){item.cl.addLayer(item.mk);shown++;}
    });
    document.getElementById('f-count').textContent='Показано: '+shown+' / '+_items.length;
};
window.resetFilters=function(){
    document.getElementById('fp').value=PRICE_MAX_K;
    document.getElementById('fa').value=50;
    document.getElementById('fs').value=0;

};

        L.DomEvent.disableClickPropagation(d);
        L.DomEvent.disableScrollPropagation(d);
        return d;
    }
});
(function tryAdd(){
    var theMap=window[MAP_NAME];
    if(theMap){new FilterControl().addTo(theMap);}
    else{setTimeout(tryAdd,200);}
})();
})();
