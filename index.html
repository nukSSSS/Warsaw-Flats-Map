    detail.forEach(function(d){
        if(_marketFilter&&d.mt!==_marketFilter) return;
        if(_userTypeFilter&&d.ut!==_userTypeFilter) return;

}

function _init(){

                var key=ll.lat.toFixed(5)+','+ll.lng.toFixed(5);
                _items.push({mk:mk,cl:cl,d:LOC_INDEX[key]||null});
            });
        });
    });
    var _totalApts=0;
    _items.forEach(function(item){
        var _ll=item.mk.getLatLng();
        var _k=_ll.lat.toFixed(5)+','+_ll.lng.toFixed(5);
        _totalApts+=(window.aptCounts[_k]||1);
    });
    window._totalApts=_totalApts;
    var el=document.getElementById('f-count');
    if(el) el.textContent='\u041a\u0432\u0430\u0440\u0442\u0438\u0440: '+_totalApts;
    var _qp=new URLSearchParams(window.location.search);
    var _qd=_qp.get('district'),_qs=_qp.get('score'),_qpr=_qp.get('price');
    if(_qd){var _fd=document.getElementById('fd');if(_fd)_fd.value=_qd;}
    if(_qs){var _fs=document.getElementById('fs-min');if(_fs)_fs.value=_qs;}
    if(_qpr){var _fp=document.getElementById('fp-max');if(_fp)_fp.value=_qpr;}

                    var cb=lbl.querySelector('input[type=checkbox]');

function _filterOpenPopup(){

    var el=theMap._popup.getElement();
    if(!el) return;
    var rows=el.querySelectorAll('.listing-row');
    if(!rows.length) return;
    var visible=0;
    rows.forEach(function(r){
        var show=true;
        if(_marketFilter&&r.getAttribute('data-mt')!==_marketFilter) show=false;
        if(_userTypeFilter&&r.getAttribute('data-ut')!==_userTypeFilter) show=false;
        if(_csFilter&&r.getAttribute('data-cs')!==_csFilter) show=false;
        r.style.display=show?'':'none';
        if(show) visible++;

window.applyFilters=function(){

    document.getElementById('fa-min-val').textContent=minA<=0?'\u2014':minA+' \u043c\u00b2';
    document.getElementById('fa-max-val').textContent=maxA>=AREA_MAX?'\u043b\u044e\u0431\u0430\u044f':maxA+' \u043c\u00b2';
    document.getElementById('fs-min-val').textContent=minS<=0?'\u2014':minS+' / '+MAX_SCORE;
    document.getElementById('fs-max-val').textContent=maxS>=MAX_SCORE?'\u043b\u044e\u0431\u043e\u0439':maxS+' / '+MAX_SCORE;

            if(maxP<PRICE_MAX_K&&d.p!==null&&d.p>maxP*1000) ok=false;
            if(minA>0&&d.a!==null&&d.a<minA) ok=false;
            if(maxA<AREA_MAX&&d.a!==null&&d.a>maxA) ok=false;
            if(minS>0&&d.s<minS) ok=false;
            if(maxS<MAX_SCORE&&d.s>maxS) ok=false;
            if(distQ&&(!d.d||d.d.toLowerCase()!==distQ)) ok=false;
            if(_marketFilter&&d.mt.indexOf(_marketFilter)<0) ok=false;
            if(_userTypeFilter&&d.ut.indexOf(_userTypeFilter)<0) ok=false;
            if(_csFilter&&d.cs.indexOf(_csFilter)<0) ok=false;
        }
        var _ll=item.mk.getLatLng();
        var _k=_ll.lat.toFixed(5)+','+_ll.lng.toFixed(5);
        if(ok){item.cl.addLayer(item.mk);
            shown+=_countMatch(_k);
