var PRICE_MAX_K = 2550;
var MAP_NAME    = 'map_4ec58b05cadb7382a95319901da83eab';
var MAX_SCORE   = 3760;
var _items=[],_clusters=[];
function _fmtPrice(k){
    return (k*1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' PLN';
}
function _isCluster(l){
    return l&&typeof l.clearLayers==='function'&&l.options&&l.options.maxClusterRadius!==undefined&&l.options.isFilterable===true;
}
function _init(){
    var theMap=window[MAP_NAME];
    if(!theMap){setTimeout(_init,300);return;}
    theMap.eachLayer(function(fg){
        if(!fg.eachLayer) return;
        fg.eachLayer(function(cl){
            if(!_isCluster(cl)) return;
            _clusters.push(cl);
            cl.eachLayer(function(mk){
                var ll=mk.getLatLng();
                var key=ll.lat.toFixed(5)+','+ll.lng.toFixed(5);
                _items.push({mk:mk,cl:cl,d:LOC_INDEX[key]||null});
            });
        });
    });
    var el=document.getElementById('f-count');
    if(el) el.textContent='Маркеров: '+_items.length;
    var _qp=new URLSearchParams(window.location.search);
    var _qd=_qp.get('district'),_qs=_qp.get('score'),_qpr=_qp.get('price');
    if(_qd){var _fd=document.getElementById('fd');if(_fd)_fd.value=_qd;}
    if(_qs){var _fs=document.getElementById('fs');if(_fs)_fs.value=_qs;}
    if(_qpr){var _fp=document.getElementById('fp');if(_fp)_fp.value=_qpr;}
    if(_qd||_qs||_qpr){
        window.applyFilters();
        if(window._filterBody){window._filterBody.style.display='block';window._filterArrow.textContent='▲';}
    }
}
setTimeout(_init,900);
window.applyFilters=function(){
    var maxP=+document.getElementById('fp').value;
    var minA=+document.getElementById('fa').value;
    var minS=+document.getElementById('fs').value;
    var distQ=(document.getElementById('fd').value||'').toLowerCase().trim();
    document.getElementById('fp-val').textContent=maxP>=PRICE_MAX_K?'любая':_fmtPrice(maxP);
    document.getElementById('fa-val').textContent=minA<=50?'любая':minA+' м²';
    document.getElementById('fs-val').textContent=minS<=0?'любой':minS+' / '+MAX_SCORE;
    _clusters.forEach(function(cl){cl.clearLayers();});
    var shown=0;
    _items.forEach(function(item){
        var d=item.d,ok=true;
        if(d){
            if(maxP<PRICE_MAX_K&&d.p!==null&&d.p>maxP*1000) ok=false;
            if(minA>50&&d.a!==null&&d.a<minA) ok=false;
            if(minS>0&&d.s<minS) ok=false;
            if(distQ&&(!d.d||d.d.toLowerCase().indexOf(distQ)<0)) ok=false;
        }
        if(ok){item.cl.addLayer(item.mk);shown++;}
    });
    document.getElementById('f-count').textContent='Показано: '+shown+' / '+_items.length;
};
window.resetFilters=function(){
    document.getElementById('fp').value=PRICE_MAX_K;
    document.getElementById('fa').value=50;
    document.getElementById('fs').value=0;
    document.getElementById('fd').value='';
    window.applyFilters();
};

        var right=document.createElement('span');

        resetBtn.onclick=function(e){e.stopPropagation();window.resetFilters();};
        var arrow=document.createElement('span');
        arrow.textContent='\u25bc';
        arrow.style.cssText='font-size:11px;color:#888;';
        right.appendChild(resetBtn);
        right.appendChild(arrow);
        hd.appendChild(title);
        hd.appendChild(right);
        var body=document.createElement('div');
        body.style.cssText='padding:0 14px 12px;display:none;';
        body.innerHTML=            '<div style="color:#666;">Район</div>' + '<input id="fd" type="text" placeholder="напр. Bemowo" oninput="applyFilters()"' + ' style="width:100%;box-sizing:border-box;padding:3px 6px;border:1px solid #ccc;border-radius:3px;font-size:12px;margin-bottom:4px;">' + '<div style="color:#666;">Цена до</div>' + '<input id="fp" type="range" min="0" max="2550" step="50" value="2550" style="width:100%;" oninput="applyFilters()">' + '<div style="text-align:right;font-weight:600;" id="fp-val">любая</div>' + '<div style="color:#666;margin-top:4px;">Площадь от</div>' + '<input id="fa" type="range" min="50" max="157" step="5" value="50" style="width:100%;" oninput="applyFilters()">' + '<div style="text-align:right;font-weight:600;" id="fa-val">любая</div>' + '<div style="color:#666;margin-top:4px;">Score от</div>' + '<input id="fs" type="range" min="0" max="3760" step="50" value="0" style="width:100%;" oninput="applyFilters()">' + '<div style="text-align:right;font-weight:600;" id="fs-val">любой</div>' + '<div id="f-count" style="margin-top:8px;padding-top:6px;border-top:1px solid #eee;color:#999;font-size:11px;text-align:center;"></div>';
        hd.onclick=function(){
            var hidden=body.style.display==='none';
            body.style.display=hidden?'block':'none';
            arrow.textContent=hidden?'\u25b2':'\u25bc';
        };
        c.appendChild(hd);
        c.appendChild(body);
        window._filterBody=body;
        window._filterArrow=arrow;
        L.DomEvent.disableClickPropagation(c);
        L.DomEvent.disableScrollPropagation(c);
        return c;
    }
});
(function tryAdd(){
    var theMap=window[MAP_NAME];
    if(theMap){new FilterControl().addTo(theMap);}
    else{setTimeout(tryAdd,200);}
})();
})();
