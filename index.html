var MAP_NAME    = 'map_73d1820f2b84b230aa38790863bdee96';
var MAX_SCORE   = 3610;
var _items=[],_clusters=[];
function _fmtPrice(k){
    return (k*1000).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' PLN';
}
function _isCluster(l){
    return l&&typeof l.clearLayers==='function'&&l.options&&l.options.maxClusterRadius!==undefined&&l.options.isFilterable===true;
}
function _init(){
    var theMap=window[MAP_NAME];
    if(!theMap){setTimeout(_init,300);return;}

        if(!fg.eachLayer) return;
        fg.eachLayer(function(cl){

    if(_qpr){var _fp=document.getElementById('fp');if(_fp)_fp.value=_qpr;}
    if(_qd||_qs||_qpr){window.applyFilters();}
}

window.applyFilters=function(){

    var distQ=(document.getElementById('fd').value||'').toLowerCase().trim();

    document.getElementById('fs-val').textContent=minS<=0?'любой':minS+' / '+MAX_SCORE;
    _clusters.forEach(function(cl){cl.clearLayers();});
    var shown=0;
    _items.forEach(function(item){
        var d=item.d,ok=true;
        if(d){
            if(maxP<PRICE_MAX_K&&d.p!==null&&d.p>maxP*1000) ok=false;

            if(minS>0&&d.s<minS) ok=false;

};
